name: Release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  # id-token: write  # reserved for future PyPI trusted publisher

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: Run ruff check
        run: ruff check src/ tests/
      - name: Run ruff format check
        run: ruff format --check src/ tests/
      - name: Install project
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
      # Skip tag/pyproject version parity check on manual dispatch
      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyver=$(python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$pyver" ]; then
            echo "Tag version ($tag) does not match pyproject.toml version ($pyver)" >&2
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install build twine
      - name: Build distribution
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$notes" | tr -d '[:space:]')" ]; then
            notes="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$notes"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Detect prerelease
        id: prerelease
        run: |
          tag="${GITHUB_REF_NAME}"
          if echo "$tag" | grep -qE -- '-(rc|beta|alpha)'; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/*.tar.gz
            dist/*.whl
