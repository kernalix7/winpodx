name: AppImage

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to build from (e.g. v0.5.8). Leave empty to build from the selected ref (usually main) -- useful for verifying the recipe before cutting a tag."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # workflow_dispatch input: explicit tag; tag push: ref already there.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build python-appimage

      - name: Install FUSE runtime for appimagetool
        # ubuntu-24.04 runners ship without libfuse2; python-appimage's
        # downloaded appimagetool tries to FUSE-mount itself and fails
        # silently when libfuse2 is missing, producing no AppImage and
        # the next step bombs with "No AppImage produced." libfuse2t64
        # is the 24.04 transition package that provides libfuse.so.2.
        run: sudo apt-get update && sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Build winpodx wheel
        run: python -m build --wheel --outdir dist

      - name: Pin AppImage recipe to the freshly-built wheel
        run: |
          WHEEL="$(ls -t dist/winpodx-*.whl | head -n1)"
          if [ -z "${WHEEL}" ]; then
              echo "No wheel produced under dist/; aborting." >&2
              exit 1
          fi
          echo "Using wheel: ${WHEEL}"
          WHEEL_ABS="$(readlink -f "${WHEEL}")"
          printf '%s[gui,reverse-open]\n' "${WHEEL_ABS}" > packaging/appimage/recipe/requirements.txt

      - name: Build AppImage
        working-directory: packaging/appimage
        env:
          # Belt-and-braces: even with libfuse2 present, some appimagetool
          # nightlies refuse to FUSE-mount on minimal CI shells. This env
          # tells appimagetool to extract itself + re-exec rather than
          # mount, which always works in a container/CI environment.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: python -m python_appimage build app -p 3.11 recipe/

      - name: Locate built AppImage
        id: locate
        run: |
          APPIMAGE="$(ls -t packaging/appimage/winpodx-*-x86_64.AppImage | head -n1)"
          if [ -z "${APPIMAGE}" ]; then
              echo "No AppImage produced." >&2
              exit 1
          fi
          echo "appimage_path=${APPIMAGE}" >> "$GITHUB_OUTPUT"
          ls -lh "${APPIMAGE}"

      - name: Upload as workflow artefact (always)
        uses: actions/upload-artifact@v4
        with:
          name: winpodx-appimage-x86_64
          path: ${{ steps.locate.outputs.appimage_path }}
          if-no-files-found: error

      - name: Attach to GitHub Release (tag push only)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.appimage_path }}
          # Don't create the release if it doesn't already exist --
          # release.yml (REL- marker tag) owns release creation.
          fail_on_unmatched_files: true
