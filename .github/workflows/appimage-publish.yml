name: AppImage

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to build from (e.g. v0.5.8). Leave empty to build from the selected ref (usually main) -- useful for verifying the recipe before cutting a tag."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # workflow_dispatch input: explicit tag; tag push: ref already there.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build prerequisites
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build python-appimage

      - name: Pre-install appimagetool (extract-and-wrap, FUSE-free)
        # ubuntu-24.04 runners cannot mount AppImages via FUSE in the
        # GitHub runner environment regardless of libfuse2 being apt-
        # installed (sandbox / SECCOMP restrictions on user_namespaces).
        # python-appimage downloads its own appimagetool and runs it
        # without honouring APPIMAGE_EXTRACT_AND_RUN, so we shortcut
        # the entire FUSE path: download appimagetool ourselves,
        # extract its squashfs payload, and put a thin wrapper on PATH
        # that exec's into the extracted AppRun. python-appimage's
        # `which("appimagetool")` finds our wrapper and skips its own
        # download path.
        run: |
          cd /tmp
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract >/dev/null
          sudo mv squashfs-root /opt/appimagetool
          sudo tee /usr/local/bin/appimagetool >/dev/null <<'WRAPPER'
          #!/bin/sh
          exec /opt/appimagetool/AppRun "$@"
          WRAPPER
          sudo chmod +x /usr/local/bin/appimagetool
          appimagetool --version || true

      - name: Build winpodx wheel
        run: python -m build --wheel --outdir dist

      - name: Pin AppImage recipe to the freshly-built wheel
        run: |
          WHEEL="$(ls -t dist/winpodx-*.whl | head -n1)"
          if [ -z "${WHEEL}" ]; then
              echo "No wheel produced under dist/; aborting." >&2
              exit 1
          fi
          echo "Using wheel: ${WHEEL}"
          WHEEL_ABS="$(readlink -f "${WHEEL}")"
          printf '%s[gui,reverse-open]\n' "${WHEEL_ABS}" > packaging/appimage/recipe/requirements.txt

      - name: Build lean AppImage (Python + winpodx + Qt only)
        working-directory: packaging/appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: python -m python_appimage build app -p 3.11 recipe/

      - name: Extract lean AppImage for system-bin overlay
        working-directory: packaging/appimage
        run: |
          LEAN="$(ls -t winpodx-*-x86_64.AppImage | head -n1)"
          if [ -z "${LEAN}" ]; then
              echo "python-appimage produced no AppImage." >&2
              exit 1
          fi
          echo "Lean AppImage: ${LEAN}"
          chmod +x "${LEAN}"
          ./"${LEAN}" --appimage-extract >/dev/null
          mv squashfs-root AppDir
          rm "${LEAN}"
          ls AppDir

      - name: Bundle system binaries (FreeRDP + Podman) via Fedora 41
        # Fat-bundle stage: pulls xfreerdp3, podman, podman-compose,
        # conmon, crun, netavark, slirp4netns, pasta out of a Fedora 41
        # container and traverses ldd to bring in transitive lib deps.
        # Host-critical libs (glibc, libX11, libwayland, libGL, ...)
        # stay on the host -- they cannot be bundled without breaking
        # desktop integration or hard-crashing on glibc mismatch.
        run: |
          docker run --rm \
              -v "$PWD/packaging/appimage:/work" \
              fedora:41 bash -c '
                  set -euo pipefail
                  dnf install -y --setopt=install_weak_deps=False \
                      freerdp \
                      podman \
                      podman-compose \
                      conmon \
                      crun \
                      netavark \
                      slirp4netns \
                      passt \
                      file
                  bash /work/bundle-system-bins.sh /work/AppDir
              '

      - name: Repack as fat AppImage
        working-directory: packaging/appimage
        run: |
          # appimagetool reads /AppDir/winpodx.desktop + /AppDir/winpodx.png
          # + /AppDir/AppRun (python-appimage put a usable AppRun there).
          OUT="winpodx-fat-x86_64.AppImage"
          appimagetool AppDir "${OUT}"
          chmod +x "${OUT}"
          ls -lh "${OUT}"

      - name: Locate built AppImage
        id: locate
        run: |
          APPIMAGE="$(ls -t packaging/appimage/winpodx-fat-x86_64.AppImage | head -n1)"
          if [ -z "${APPIMAGE}" ]; then
              echo "No AppImage produced." >&2
              exit 1
          fi
          echo "appimage_path=${APPIMAGE}" >> "$GITHUB_OUTPUT"
          ls -lh "${APPIMAGE}"

      - name: Upload as workflow artefact (always)
        uses: actions/upload-artifact@v4
        with:
          name: winpodx-appimage-x86_64
          path: ${{ steps.locate.outputs.appimage_path }}
          if-no-files-found: error

      - name: Attach to GitHub Release (tag push only)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate.outputs.appimage_path }}
          # Don't create the release if it doesn't already exist --
          # release.yml (REL- marker tag) owns release creation.
          fail_on_unmatched_files: true
